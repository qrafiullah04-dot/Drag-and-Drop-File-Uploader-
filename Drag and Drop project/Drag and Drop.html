<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag and Drop File Uploader</title>
    <link rel="stylesheet" href="Drag and Drop.css">
</head>
<body>
    <div class="container">

        <div id="drop-area">
            <input type="file" accept="image/*" id="input-file" hidden>

            <div id="img-view">
                <img src="upload icon.jpg">
                <p>Drag and drop image here</p>
                <span>or</span>
                <button id="browse-btn" type="button">
                    Browse Images
                </button>
                <span>Upload PNG, GIF, JPG and other images</span>
                <p id="error-msg"></p>
            </div>

        </div>

        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <p id="progress-text">0%</p>

                <button id="submit-btn" type="button">Submit</button>
        
        
    </div>
    <script src="Drag and Drop.js"></script>
</body>
</html>
